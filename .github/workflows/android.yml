name: Android CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    env:
      GST_VERSION: 1.28.4
      ANDROID_API_LEVEL: "32"
      ANDROID_BUILD_TOOLS: "36.0.0"
      ANDROID_NDK_VERSION: "30.0.14904198"
      ANDROID_CMAKE_VERSION: "3.22.1"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Temurin JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK components
        run: |
          sdkmanager --install \
            "platform-tools" \
            "platforms;android-${ANDROID_API_LEVEL}" \
            "build-tools;${ANDROID_BUILD_TOOLS}" \
            "ndk;${ANDROID_NDK_VERSION}" \
            "cmake;${ANDROID_CMAKE_VERSION}"

      - name: Clone Cerbero
        run: |
          git clone --depth 1 --branch "${GST_VERSION}" \
            https://gitlab.freedesktop.org/gstreamer/cerbero.git \
            "${RUNNER_TEMP}/cerbero"

      - name: Refresh apt package index
        # The Azure apt mirror used by GitHub-hosted runners can serve a stale
        # Packages index that still references superseded .deb versions
        # (e.g. libcurl4-openssl-dev 8.5.0-2ubuntu10.9). Cerbero's bootstrap
        # runs `apt-get install` without an update first, which then 404s.
        # Refreshing the index here avoids the transient failure.
        run: sudo apt-get update -y

      - name: Bootstrap Cerbero for Android arm64
        working-directory: ${{ runner.temp }}/cerbero
        run: |
          ./cerbero-uninstalled -c config/cross-android-arm64.cbc bootstrap

      - name: Build GStreamer Android arm64 sysroot
        working-directory: ${{ runner.temp }}/cerbero
        run: |
          ./cerbero-uninstalled \
            -c config/cross-android-arm64.cbc \
            package gstreamer-1.0 --artifact tarball

      - name: Resolve GStreamer sysroot
        run: |
          mkdir -p "${RUNNER_TEMP}/gstreamer"
          mapfile -t GST_TARBALLS < <(find "${RUNNER_TEMP}/cerbero" -type f -name 'gstreamer-1.0-android-*.tar.xz' | sort)

          if [[ ${#GST_TARBALLS[@]} -eq 0 ]]; then
            echo "Failed to find Cerbero Android tarball outputs" >&2
            exit 1
          fi

          echo "Found Cerbero Android tarballs:"
          printf '  %s\n' "${GST_TARBALLS[@]}"

          # Some Cerbero outputs split runtime/devel packages. Extract all and
          # then pick the tree that contains gst-android/ndk-build.
          for tarball in "${GST_TARBALLS[@]}"; do
            tar -xf "${tarball}" -C "${RUNNER_TEMP}/gstreamer"
          done

          GSTREAMER_SYSROOT="$(find "${RUNNER_TEMP}/gstreamer" -type d -path '*/share/gst-android/ndk-build' -print -quit | sed 's#/share/gst-android/ndk-build##')"

          # Fallback: locate Cerbero's installed dist tree directly if the
          # package layout does not expose the expected path after extraction.
          if [[ -z "${GSTREAMER_SYSROOT}" ]]; then
            GSTREAMER_SYSROOT="$(find "${RUNNER_TEMP}/cerbero" -type d -path '*/share/gst-android/ndk-build' -print -quit | sed 's#/share/gst-android/ndk-build##')"
          fi

          if [[ -z "${GSTREAMER_SYSROOT}" ]]; then
            echo "Failed to locate a GStreamer sysroot containing share/gst-android/ndk-build" >&2
            echo "Directory sample under ${RUNNER_TEMP}/gstreamer:" >&2
            find "${RUNNER_TEMP}/gstreamer" -maxdepth 4 -type d | head -n 200 >&2
            exit 1
          fi

          echo "Resolved GSTREAMER_SYSROOT=${GSTREAMER_SYSROOT}"
          echo "GSTREAMER_SYSROOT=${GSTREAMER_SYSROOT}" >> "${GITHUB_ENV}"

      - name: Create shared Android env.sh
        run: |
          mkdir -p "$HOME/shared/platforms/android"
          cat > "$HOME/shared/platforms/android/env.sh" <<EOF
          export ANDROID_HOME="${ANDROID_SDK_ROOT}"
          export ANDROID_NDK_HOME="${ANDROID_SDK_ROOT}/ndk/${ANDROID_NDK_VERSION}"
          export GSTREAMER_SYSROOT="${GSTREAMER_SYSROOT}"
          export CERBERO_BRANCH="${GST_VERSION}"
          EOF

      - name: Verify toolchain inputs
        run: |
          test -f "$HOME/shared/platforms/android/env.sh"
          test -d "${GSTREAMER_SYSROOT}/share/gst-android/ndk-build"
          test -d "${ANDROID_SDK_ROOT}/ndk/${ANDROID_NDK_VERSION}"

      - name: Build debug APK
        run: |
          chmod +x gradlew build_android.sh
          ./build_android.sh debug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk

      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            app/build/reports
            app/build/outputs/logs
            app/.cxx