name: Android CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    env:
      GST_VERSION: 1.28.4
      ANDROID_API_LEVEL: "32"
      ANDROID_BUILD_TOOLS: "36.0.0"
      ANDROID_NDK_VERSION: "30.0.14904198"
      ANDROID_CMAKE_VERSION: "3.22.1"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Temurin JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK components
        run: |
          sdkmanager --install \
            "platform-tools" \
            "platforms;android-${ANDROID_API_LEVEL}" \
            "build-tools;${ANDROID_BUILD_TOOLS}" \
            "ndk;${ANDROID_NDK_VERSION}" \
            "cmake;${ANDROID_CMAKE_VERSION}"

      - name: Clone Cerbero
        run: |
          git clone --depth 1 --branch "${GST_VERSION}" \
            https://gitlab.freedesktop.org/gstreamer/cerbero.git \
            "${RUNNER_TEMP}/cerbero"

      - name: Bootstrap Cerbero for Android arm64
        working-directory: ${{ runner.temp }}/cerbero
        run: |
          ./cerbero-uninstalled -c config/cross-android-arm64.cbc bootstrap

      - name: Build GStreamer Android arm64 sysroot
        working-directory: ${{ runner.temp }}/cerbero
        run: |
          ./cerbero-uninstalled \
            -c config/cross-android-arm64.cbc \
            package gstreamer-1.0 --artifact tarball

      - name: Extract GStreamer sysroot
        run: |
          mkdir -p "${RUNNER_TEMP}/gstreamer"
          GST_TARBALL="$(find "${RUNNER_TEMP}/cerbero" -maxdepth 1 -type f -name 'gstreamer-1.0-android-*.tar.xz' | head -n 1)"

          if [[ -z "${GST_TARBALL}" ]]; then
            echo "Failed to find the Cerbero Android tarball output" >&2
            exit 1
          fi

          tar -xf "${GST_TARBALL}" -C "${RUNNER_TEMP}/gstreamer"

          GSTREAMER_SYSROOT="$(find "${RUNNER_TEMP}/gstreamer" -type d -path '*/share/gst-android/ndk-build' -print -quit | sed 's#/share/gst-android/ndk-build##')"

          if [[ -z "${GSTREAMER_SYSROOT}" ]]; then
            echo "Failed to locate a GStreamer sysroot containing share/gst-android/ndk-build" >&2
            exit 1
          fi

          echo "GSTREAMER_SYSROOT=${GSTREAMER_SYSROOT}" >> "${GITHUB_ENV}"

      - name: Create shared Android env.sh
        run: |
          mkdir -p "$HOME/shared/platforms/android"
          cat > "$HOME/shared/platforms/android/env.sh" <<EOF
          export ANDROID_HOME="${ANDROID_SDK_ROOT}"
          export ANDROID_NDK_HOME="${ANDROID_SDK_ROOT}/ndk/${ANDROID_NDK_VERSION}"
          export GSTREAMER_SYSROOT="${GSTREAMER_SYSROOT}"
          export CERBERO_BRANCH="${GST_VERSION}"
          EOF

      - name: Verify toolchain inputs
        run: |
          test -f "$HOME/shared/platforms/android/env.sh"
          test -d "${GSTREAMER_SYSROOT}/share/gst-android/ndk-build"
          test -d "${ANDROID_SDK_ROOT}/ndk/${ANDROID_NDK_VERSION}"

      - name: Build debug APK
        run: |
          chmod +x gradlew build_android.sh
          ./build_android.sh debug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk

      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            app/build/reports
            app/build/outputs/logs
            app/.cxx